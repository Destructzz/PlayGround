version: "2"
sql:
  - engine: "postgresql"
    schema:
      - "sql/schema.sql"
    queries:
      - "sql/queries/*.sql"
    gen:
      go:
        package: "sqlc"
        out: "internal/repo/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
