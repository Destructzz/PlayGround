basePath: /
definitions:
  domain.CreateServiceRequest:
    properties:
      currency:
        type: string
      description:
        type: string
      duration:
        type: integer
      is_active:
        type: boolean
      name:
        type: string
      price:
        type: string
      zone_id:
        type: integer
    required:
    - currency
    - description
    - duration
    - name
    - price
    - zone_id
    type: object
  domain.CreateZoneRequest:
    properties:
      capacity:
        minimum: 1
        type: integer
      description:
        type: string
      is_active:
        type: boolean
      name:
        type: string
      type:
        allOf:
        - $ref: '#/definitions/sqlc.ZoneType'
        enum:
        - game
        - event
        - vip
        - lounge
        - sys
    required:
    - capacity
    - name
    - type
    type: object
  domain.PatchZoneRequest:
    properties:
      capacity:
        minimum: 1
        type: integer
      description:
        type: string
      is_active:
        type: boolean
      name:
        type: string
      type:
        allOf:
        - $ref: '#/definitions/sqlc.ZoneType'
        enum:
        - game
        - event
        - vip
        - lounge
        - sys
    type: object
  domain.UpdateServiceRequest:
    properties:
      currency:
        type: string
      description:
        type: string
      duration:
        type: integer
      is_active:
        type: boolean
      name:
        type: string
      price:
        type: string
      zone_id:
        type: integer
    type: object
  response.AuthResponse:
    properties:
      request_id:
        example: 7fbd6854-8e42-4451-80ee-6da60aeceacd
        type: string
      timestamp:
        example: "2026-01-19T15:37:27.514667373Z"
        type: string
      user:
        $ref: '#/definitions/response.AuthUserResponse'
    type: object
  response.AuthUserResponse:
    properties:
      avatar_url:
        example: https://example.com/avatar.jpg
        type: string
      email:
        example: user@example.com
        type: string
      name:
        example: Ada Lovelace
        type: string
      provider:
        example: google
        type: string
    type: object
  response.DeleteServiceResponse:
    properties:
      id:
        example: 1
        type: integer
      request_id:
        example: 7fbd6854-8e42-4451-80ee-6da60aeceacd
        type: string
      timestamp:
        example: "2026-01-19T15:37:27.514667373Z"
        type: string
    type: object
  response.DeleteZoneResponse:
    properties:
      id:
        example: 1
        type: integer
      request_id:
        example: 7fbd6854-8e42-4451-80ee-6da60aeceacd
        type: string
      timestamp:
        example: "2026-01-19T15:37:27.514667373Z"
        type: string
    type: object
  response.ErrorResponse:
    properties:
      code:
        example: auth_failed
        type: string
      details: {}
      message:
        example: Authentication failed
        type: string
      request_id:
        example: 7fbd6854-8e42-4451-80ee-6da60aeceacd
        type: string
      timestamp:
        example: "2026-01-19T15:37:27.514667373Z"
        type: string
    type: object
  response.HealthResponse:
    properties:
      request_id:
        example: 7fbd6854-8e42-4451-80ee-6da60aeceacd
        type: string
      status:
        example: ready
        type: string
      timestamp:
        example: "2026-01-19T15:37:27.514667373Z"
        type: string
    type: object
  response.MessageResponse:
    properties:
      message:
        example: pong
        type: string
      request_id:
        example: 7fbd6854-8e42-4451-80ee-6da60aeceacd
        type: string
      timestamp:
        example: "2026-01-19T15:37:27.514667373Z"
        type: string
    type: object
  response.ServiceDoc:
    properties:
      created_at:
        example: "2026-01-19T15:37:27.514667373Z"
        type: string
      currency:
        example: USD
        type: string
      description:
        example: 1 hour of VIP PS5
        type: string
      duration:
        example: 60
        type: integer
      id:
        example: 1
        type: integer
      is_active:
        example: true
        type: boolean
      name:
        example: VIP Gaming
        type: string
      price:
        example: "15.00"
        type: string
      updated_at:
        example: "2026-01-19T15:37:27.514667373Z"
        type: string
      zone_id:
        example: 1
        type: integer
    type: object
  response.ServiceListResponse:
    properties:
      request_id:
        example: 7fbd6854-8e42-4451-80ee-6da60aeceacd
        type: string
      services:
        items:
          $ref: '#/definitions/response.ServiceDoc'
        type: array
      timestamp:
        example: "2026-01-19T15:37:27.514667373Z"
        type: string
    type: object
  response.ServiceResponse:
    properties:
      request_id:
        example: 7fbd6854-8e42-4451-80ee-6da60aeceacd
        type: string
      service:
        $ref: '#/definitions/response.ServiceDoc'
      timestamp:
        example: "2026-01-19T15:37:27.514667373Z"
        type: string
    type: object
  response.ZoneDoc:
    properties:
      capacity:
        example: 20
        type: integer
      created_at:
        example: "2026-01-19T15:37:27.514667373Z"
        type: string
      description:
        example: Large hall
        type: string
      id:
        example: 1
        type: integer
      is_active:
        example: true
        type: boolean
      name:
        example: Main Hall
        type: string
      updated_at:
        example: "2026-01-19T15:37:27.514667373Z"
        type: string
      zone_type:
        example: game
        type: string
    type: object
  response.ZoneListResponse:
    properties:
      request_id:
        example: 7fbd6854-8e42-4451-80ee-6da60aeceacd
        type: string
      timestamp:
        example: "2026-01-19T15:37:27.514667373Z"
        type: string
      zones:
        items:
          $ref: '#/definitions/response.ZoneDoc'
        type: array
    type: object
  response.ZoneResponse:
    properties:
      request_id:
        example: 7fbd6854-8e42-4451-80ee-6da60aeceacd
        type: string
      timestamp:
        example: "2026-01-19T15:37:27.514667373Z"
        type: string
      zone:
        $ref: '#/definitions/response.ZoneDoc'
    type: object
  sqlc.ZoneType:
    enum:
    - game
    - event
    - vip
    - lounge
    - sys
    type: string
    x-enum-varnames:
    - ZoneTypeGame
    - ZoneTypeEvent
    - ZoneTypeVip
    - ZoneTypeLounge
    - ZoneTypeSys
host: localhost:8080
info:
  contact: {}
  description: Backend API for PlayGround
  title: PlayGround API
  version: "1.0"
paths:
  /api/v1/auth/{provider}:
    get:
      description: Redirects to provider authorization page
      parameters:
      - description: OAuth provider
        enum:
        - google
        in: path
        name: provider
        required: true
        type: string
      responses:
        "307":
          description: Redirect to provider
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Start OAuth
      tags:
      - auth
  /api/v1/auth/{provider}/callback:
    get:
      description: Completes OAuth flow and returns user profile
      parameters:
      - description: OAuth provider
        enum:
        - google
        in: path
        name: provider
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: OAuth callback
      tags:
      - auth
  /api/v1/ping:
    get:
      description: Returns pong with timestamp
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.MessageResponse'
      summary: Ping
      tags:
      - health
  /api/v1/pong:
    get:
      description: Returns ping with timestamp
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.MessageResponse'
      summary: Pong
      tags:
      - health
  /api/v1/service:
    get:
      description: Returns all services
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.ServiceListResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: List services
      tags:
      - services
    post:
      consumes:
      - application/json
      description: Creates a service from JSON payload
      parameters:
      - description: Service payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/domain.CreateServiceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.ServiceResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Create service
      tags:
      - services
  /api/v1/service/{id}:
    delete:
      description: Deletes service by id
      parameters:
      - description: Service ID
        format: int64
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.DeleteServiceResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Delete service
      tags:
      - services
    get:
      description: Returns service id from path param
      parameters:
      - description: Service ID
        format: int64
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.ServiceResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Get service by id
      tags:
      - services
    patch:
      consumes:
      - application/json
      description: Partially updates service fields by id
      parameters:
      - description: Service ID
        format: int64
        in: path
        name: id
        required: true
        type: integer
      - description: Service patch payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/domain.UpdateServiceRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/response.ServiceResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Patch service
      tags:
      - services
  /api/v1/zone:
    get:
      description: Returns all zones
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.ZoneListResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: List zones
      tags:
      - zones
    post:
      consumes:
      - application/json
      description: Creates a zone from JSON payload
      parameters:
      - description: Zone payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/domain.CreateZoneRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.ZoneResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Create zone
      tags:
      - zones
  /api/v1/zone/{id}:
    delete:
      description: Deletes zone by id
      parameters:
      - description: Zone ID
        format: int64
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.DeleteZoneResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Delete zone
      tags:
      - zones
    get:
      description: Returns zone id from path param
      parameters:
      - description: Zone ID
        format: int64
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.ZoneResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Get zone by id
      tags:
      - zones
    patch:
      consumes:
      - application/json
      description: Partially updates zone fields by id
      parameters:
      - description: Zone ID
        format: int64
        in: path
        name: id
        required: true
        type: integer
      - description: Zone patch payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/domain.PatchZoneRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.ZoneResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Patch zone
      tags:
      - zones
  /healthz:
    get:
      description: Returns service status and timestamp
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.HealthResponse'
      summary: Liveness check
      tags:
      - health
  /readyz:
    get:
      description: Pings database and returns readiness status
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.HealthResponse'
      summary: Readiness check
      tags:
      - health
swagger: "2.0"
