host: localhost
info:
  contact: {}
  description: Backend API for PlayGround
  title: PlayGround API
  version: "1.0"
paths:
  /api/v1/auth/{provider}:
    get:
      description: Redirects to provider authorization page
      parameters:
      - description: OAuth provider
        enum:
        - google
        in: path
        name: provider
        required: true
        type: string
      responses:
        "307":
          description: Redirect to provider
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Start OAuth
      tags:
      - auth
  /api/v1/auth/{provider}/callback:
    get:
      description: Completes OAuth flow and redirects with session cookie
      parameters:
      - description: OAuth provider
        enum:
        - google
        in: path
        name: provider
        required: true
        type: string
      responses:
        "302":
          description: Redirect to frontend
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: OAuth callback
      tags:
      - auth
  /api/v1/auth/logout:
    post:
      description: Clears session cookie and deletes server session
      responses:
        "204":
          description: No Content
      summary: Logout
      tags:
      - auth
  /api/v1/auth/session:
    get:
      description: Returns current authenticated user or signed-out state
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Get session
      tags:
      - auth
  /api/v1/booking:
    get:
      description: Returns all bookings
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.BookingListResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: List bookings
      tags:
      - bookings
    post:
      consumes:
      - application/json
      description: Creates a booking from JSON payload (user derived from session)
      parameters:
      - description: Booking payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/domain.CreateBookingRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
