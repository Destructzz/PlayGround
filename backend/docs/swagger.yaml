basePath: /
definitions:
  response.HealthResponse:
    properties:
      request_id:
        example: 7fbd6854-8e42-4451-80ee-6da60aeceacd
        type: string
      status:
        example: ready
        type: string
      timestamp:
        example: "2026-01-19T15:37:27.514667373Z"
        type: string
    type: object
  response.MessageResponse:
    properties:
      message:
        example: pong
        type: string
      request_id:
        example: 7fbd6854-8e42-4451-80ee-6da60aeceacd
        type: string
      timestamp:
        example: "2026-01-19T15:37:27.514667373Z"
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: Backend API for PlayGround
  title: PlayGround API
  version: "1.0"
paths:
  /api/v1/ping:
    get:
      description: Returns pong with timestamp
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.MessageResponse'
      summary: Ping
      tags:
      - health
  /api/v1/pong:
    get:
      description: Returns ping with timestamp
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.MessageResponse'
      summary: Pong
      tags:
      - health
  /healthz:
    get:
      description: Returns service status and timestamp
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.HealthResponse'
      summary: Liveness check
      tags:
      - health
  /readyz:
    get:
      description: Pings database and returns readiness status
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.HealthResponse'
      summary: Readiness check
      tags:
      - health
swagger: "2.0"
