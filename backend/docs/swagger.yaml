basePath: /
definitions:
  domain.CreateBookingRequest:
    properties:
      end_time:
        type: string
      participants:
        minimum: 1
        type: integer
      service_id:
        type: integer
      start_time:
        type: string
      status:
        allOf:
        - $ref: '#/definitions/sqlc.BookingStatus'
        enum:
        - created
        - confirmed
        - canceled
        - completed
      user_id:
        type: string
      zone_id:
        type: integer
    required:
    - end_time
    - participants
    - service_id
    - start_time
    - status
    - user_id
    - zone_id
    type: object
  domain.CreatePaymentRequest:
    properties:
      amount:
        type: string
      booking_id:
        type: integer
      currency:
        type: string
      paid_at:
        type: string
      payment_method:
        allOf:
        - $ref: '#/definitions/sqlc.PaymentMethod'
        enum:
        - cash
        - card
        - online
      receipt_number:
        type: string
      status:
        allOf:
        - $ref: '#/definitions/sqlc.PaymentStatus'
        enum:
        - pending
        - paid
        - failed
        - refunded
    required:
    - amount
    - booking_id
    - currency
    - payment_method
    type: object
  domain.CreateServiceRequest:
    properties:
      currency:
        type: string
      description:
        type: string
      duration:
        type: integer
      is_active:
        type: boolean
      name:
        type: string
      price:
        type: string
      zone_id:
        type: integer
    required:
    - currency
    - description
    - duration
    - name
    - price
    - zone_id
    type: object
  domain.CreateStaffRequest:
    properties:
      email:
        type: string
      hire_date:
        type: string
      is_active:
        type: boolean
      phone:
        type: string
      position:
        allOf:
        - $ref: '#/definitions/sqlc.PositionType'
        enum:
        - admin
        - seller
        - operator
        - tech
      user_id:
        type: string
    required:
    - hire_date
    - position
    - user_id
    type: object
  domain.CreateZoneRequest:
    properties:
      capacity:
        minimum: 1
        type: integer
      description:
        type: string
      is_active:
        type: boolean
      name:
        type: string
      type:
        allOf:
        - $ref: '#/definitions/sqlc.ZoneType'
        enum:
        - game
        - event
        - vip
        - lounge
        - sys
    required:
    - capacity
    - name
    - type
    type: object
  domain.PatchBookingRequest:
    properties:
      end_time:
        type: string
      participants:
        minimum: 1
        type: integer
      service_id:
        type: integer
      start_time:
        type: string
      status:
        allOf:
        - $ref: '#/definitions/sqlc.BookingStatus'
        enum:
        - created
        - confirmed
        - canceled
        - completed
      user_id:
        type: string
      zone_id:
        type: integer
    type: object
  domain.PatchPaymentRequest:
